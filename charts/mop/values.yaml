# Default values for microservice chart
# This is a YAML-formatted file.
# See charts/README.md for complete documentation on configuration patterns.

# --- Core Service Configuration ---

# Service name (required when installing)
name: ""

# Number of replicas
replicaCount: 2

# --- Container Image Configuration ---

image:
  repository: ""  # Full image path (e.g., ghcr.io/duynhne/auth)
  tag: v6
  pullPolicy: IfNotPresent

# --- Service Configuration ---
# One Service exposes the http port and, when service.grpc.enabled, an extra grpc
# port on the SAME Service. Ports use named targetPort (resolved against the
# container port names) + appProtocol hints.
# NOTE: gRPC on a ClusterIP Service does NOT get client-side round-robin — HTTP/2
# reuses one connection so RPCs pin to a single pod. Use a service mesh
# (Istio/Linkerd) for L7 gRPC balancing.

service:
  enabled: true   # Whole Service on/off — set false for releases that serve no traffic (e.g. a worker)
  type: ClusterIP
  # Extra Service annotations, e.g. Kong Ingress Controller per-service tuning
  # (konghq.com/connect-timeout, /read-timeout, /retries, /upstream-policy).
  annotations: {}
  http:
    port: 8080           # Service port
    containerPort: 8080  # container port (named "http")
  grpc:
    enabled: false       # Opt-in — only services that actually serve gRPC
    port: 9090           # Service port
    containerPort: 9090  # container port (named "grpc")

# --- Entrypoint Override ---

# command overrides the image ENTRYPOINT (rarely needed — the image entrypoint is
# the service binary). args are passed to it. Leave both empty for the default
# (HTTP API) process. A background process (e.g. a Temporal worker) is just this
# same chart deployed as a SEPARATE release with a different name, its own args,
# and no Service:
#   helm install order-worker ./mop -f order.yaml \
#     --set name=order-worker --set 'args={worker}' --set service.enabled=false
command: []
args: []

# --- Resource Configuration ---

resources:
  requests:
    memory: "24Mi"
    cpu: "20m"
  limits:
    memory: "64Mi"
    cpu: "50m"

# --- Health Checks ---

# Liveness probe configuration
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10

# Readiness probe configuration
readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5

# --- Environment Variables Configuration ---

# All environment variables (core + service-specific)
# Use for: SERVICE_NAME, PORT, ENV, OTEL_COLLECTOR_ENDPOINT, database config, secrets, etc.
# Supports Helm templating: {{ .Values.tracing.endpoint }}
# Supports secrets via valueFrom.secretKeyRef
env: []
# Example (see charts/values/auth.yaml for complete example):
# - name: SERVICE_NAME
#   value: "auth"
# - name: PORT
#   value: "8080"
# - name: ENV
#   value: "production"
# - name: OTEL_COLLECTOR_ENDPOINT
#   value: "otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318"
# - name: OTEL_SAMPLE_RATE
#   value: "0.1"
# - name: PYROSCOPE_ENDPOINT
#   value: "http://pyroscope.monitoring.svc.cluster.local:4040"
# - name: LOG_LEVEL
#   value: "info"
# - name: DB_HOST
#   value: "db-host.svc.cluster.local"
# - name: DB_PASSWORD
#   valueFrom:
#     secretKeyRef:
#       name: db-secret
#       key: password

# --- Kubernetes Configuration ---

# Architectural component this release plays, rendered as the standard
# app.kubernetes.io/component label on all resources. Defaults to "api" (an
# HTTP/gRPC service); a background release sets "worker" (e.g. a Temporal
# worker). Monitors select on this label (component: api / component: worker).
component: api

# Extra labels added to all resources (key: value). The standard
# app.kubernetes.io/* labels are set by the chart — use this only for extras.
labels: {}

# Pod annotations
podAnnotations: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Pod security context
podSecurityContext: {}
  # fsGroup: 1000
  # runAsUser: 1000
  # runAsNonRoot: true

# Container security context
securityContext: {}
  # allowPrivilegeEscalation: false
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000
  # capabilities:
  #   drop:
  #     - ALL

# --- SLO Configuration ---
# Generates a PrometheusServiceLevel CRD for Sloth Operator.
# When enabled, Sloth auto-generates PrometheusRules (recording + alerting)
# following Google SRE multi-window multi-burn-rate pattern.
slo:
  enabled: false
  # RFC-0014 P2: also render the semconv/OTLP copy (slo-otel.yaml) that soaks
  # side-by-side under sloth_service "<name>-otel" with staging-only alerts.
  # Requires slo.enabled too. Retired at P3 when the copy becomes canonical.
  otelEnabled: false
  namespace: "monitoring"  # Namespace where PrometheusServiceLevel CRD is created (where Sloth operator watches)
  team: "platform"
  env: "monitoring"
  availability:
    objective: 99.5
  latency:
    objective: 95.0
    threshold: "0.5"
  errorRate:
    objective: 99.0

# --- Database Migrations Configuration ---

# Enable database migrations via an init container (golang-migrate, embedded in
# the app binary; runs before the main container starts)
migrations:
  enabled: false  # Set to true to run schema migrations in an init container
  # Migrations run via the app image's `migrate` subcommand (golang-migrate,
  # embedded in the binary) — no separate migration image. Point env.DB_HOST at
  # the DIRECT database host (not a transaction pooler).
  # Environment variables for migration init container (key-value pairs)
  env: {}
  # Example:
  # env:
  #   DB_HOST: "postgres.example.com"
  #   DB_PORT: "5432"
  #   DB_NAME: "mydb"
  #   DB_USER: "user"
  #   DB_SSLMODE: "disable"
  # Environment variables from ConfigMap or Secret (optional)
  envFrom: {}
  # Example:
  # envFrom:
  #   configMapRef: "migration-config"
  #   secretRef: "db-secret"  # Will be used for DB_PASSWORD
