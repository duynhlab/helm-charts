# chart-testing (ct lint-and-install) + local KinD e2e values.
# Uses stefanprodan/podinfo — a real Go microservice that serves HTTP on :9898
# (/healthz, /readyz, /metrics) and can serve gRPC on :9999 — so the chart installs
# with no DB/SLO deps and the multi-port Service (http + grpc) is exercised against
# a realistic workload. The e2e asserts the Service renders both ports and selects
# the ready pod.
name: mop-e2e
replicaCount: 1

image:
  repository: stefanprodan/podinfo
  tag: "6.7.1"
  pullPolicy: IfNotPresent

# podinfo serves HTTP on 9898 — point the chart at it; expose it on Service :8080.
# gRPC port (9999) is added to the SAME Service via service.grpc.enabled.
service:
  enabled: true
  type: ClusterIP
  http:
    port: 8080
    containerPort: 9898
  grpc:
    enabled: true
    port: 9999
    containerPort: 9999

livenessProbe:
  enabled: true
  httpGet:
    path: /healthz
    port: 9898
  initialDelaySeconds: 2
  periodSeconds: 5
readinessProbe:
  enabled: true
  httpGet:
    path: /readyz
    port: 9898
  initialDelaySeconds: 2
  periodSeconds: 5

migrations:
  enabled: false
slo:
  enabled: false
