# chart-testing (ct lint-and-install) + local KinD e2e values.
# Uses stefanprodan/podinfo — a real Go microservice that serves HTTP on :9898
# (/healthz, /readyz, /metrics) and can serve gRPC on :9999 — so the chart installs
# with no DB/SLO deps and the gRPC headless Service is exercised against a realistic
# workload. The e2e asserts the HTTP Service + the headless gRPC Service render and
# select the ready pod.
name: mop-e2e
replicaCount: 1

image:
  repository: stefanprodan/podinfo
  tag: "6.7.1"
  pullPolicy: IfNotPresent

# podinfo serves HTTP on 9898 — point the chart at it; expose it on Service :8080.
containerPort: 9898
service:
  enabled: true
  type: ClusterIP
  port: 8080
  targetPort: 9898
  portName: http

livenessProbe:
  enabled: true
  httpGet:
    path: /healthz
    port: 9898
  initialDelaySeconds: 2
  periodSeconds: 5
readinessProbe:
  enabled: true
  httpGet:
    path: /readyz
    port: 9898
  initialDelaySeconds: 2
  periodSeconds: 5

# Exercise the gRPC headless Service (podinfo's gRPC port).
grpc:
  enabled: true
  port: 9999

migrations:
  enabled: false
slo:
  enabled: false
