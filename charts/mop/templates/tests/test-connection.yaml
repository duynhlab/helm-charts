{{- if .Values.service.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "mop.fullname" . }}-test-connection"
  namespace: {{ include "mop.namespace" . }}
  labels:
    {{- include "mop.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      command: ["wget"]
      args: ["-qO-", "{{ include "mop.fullname" . }}:{{ .Values.service.http.port }}"]
{{- end }}
