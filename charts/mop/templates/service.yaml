{{- if .Values.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mop.fullname" . }}
  namespace: {{ include "mop.namespace" . }}
  labels:
    {{- include "mop.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "mop.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.http.port }}
      targetPort: http
      protocol: TCP
      appProtocol: http
    {{- if .Values.service.grpc.enabled }}
    # gRPC shares the same Service. NOTE: a ClusterIP Service does not do gRPC
    # client-side round-robin (HTTP/2 pins one connection to one pod) — use a
    # service mesh for L7 balancing.
    - name: grpc
      port: {{ .Values.service.grpc.port }}
      targetPort: grpc
      protocol: TCP
      appProtocol: grpc
    {{- end }}
{{- end }}
