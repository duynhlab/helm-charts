{{- if .Values.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mop.fullname" . }}
  namespace: {{ include "mop.namespace" . }}
  labels:
    {{- include "mop.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "mop.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: {{ .Values.service.portName | default "http" }}
{{- end }}
{{- if .Values.grpc.enabled }}
---
# Headless Service exposing the gRPC port for east-west calls. clusterIP: None so
# the gRPC dns:/// resolver + client-side round_robin balances RPCs across every
# pod — a normal ClusterIP Service would pin one long-lived HTTP/2 connection to a
# single pod. Selects the same pods as the HTTP Service; the HTTP Service and its
# probes are unchanged.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mop.fullname" . }}-grpc
  namespace: {{ include "mop.namespace" . }}
  labels:
    {{- include "mop.labels" . | nindent 4 }}
    app.kubernetes.io/component: grpc
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "mop.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.grpc.port }}
      targetPort: {{ .Values.grpc.port }}
      protocol: TCP
      name: grpc
{{- end }}
