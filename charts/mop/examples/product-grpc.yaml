# Case: service that also serves gRPC east-west traffic. The chart adds a grpc
# port to the Service (same ClusterIP Service as http).
# Install: helm install product ./charts/mop -f charts/mop/examples/product-grpc.yaml
name: product
replicaCount: 3

image:
  repository: ghcr.io/duynhne/product
  tag: v6

service:
  grpc:
    enabled: true
    port: 9090
    containerPort: 9090

env:
  - name: SERVICE_NAME
    value: "product"
  - name: PORT
    value: "8080"
  - name: GRPC_PORT
    value: "9090"
  - name: ENV
    value: "production"
