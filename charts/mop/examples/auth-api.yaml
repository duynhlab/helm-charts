# Case: basic HTTP API service (no gRPC, no migrations).
# Install: helm install auth ./charts/mop -f charts/mop/examples/auth-api.yaml
name: auth
replicaCount: 2

image:
  repository: ghcr.io/duynhne/auth
  tag: v6

env:
  - name: SERVICE_NAME
    value: "auth"
  - name: PORT
    value: "8080"
  - name: ENV
    value: "production"
  - name: LOG_LEVEL
    value: "info"
  - name: OTEL_COLLECTOR_ENDPOINT
    value: "otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318"
