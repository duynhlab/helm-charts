# Case: API service with SLOs. Generates a PrometheusServiceLevel CRD for the
# Sloth operator, which auto-generates multi-window multi-burn-rate
# PrometheusRules (Google SRE pattern).
# Install: helm install auth ./charts/mop -f charts/mop/examples/auth-with-slo.yaml
name: auth
replicaCount: 2

image:
  repository: ghcr.io/duynhne/auth
  tag: v6

env:
  - name: SERVICE_NAME
    value: "auth"
  - name: PORT
    value: "8080"
  - name: ENV
    value: "production"

slo:
  enabled: true
  namespace: "monitoring"   # where the Sloth operator watches
  team: "platform"
  env: "production"
  availability:
    objective: 99.9
  latency:
    objective: 99.0
    threshold: "0.3"
  errorRate:
    objective: 99.5
