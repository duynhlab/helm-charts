suite: slo
templates:
  - slo.yaml
tests:
  - it: renders nothing when slo.enabled is false (default)
    set:
      name: auth
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a PrometheusServiceLevel with 3 SLOs when slo.enabled
    set:
      name: auth
      slo.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PrometheusServiceLevel
      - equal:
          path: metadata.name
          value: auth
      - equal:
          path: metadata.namespace
          value: monitoring
      - equal:
          path: spec.service
          value: auth
      - lengthEqual:
          path: spec.slos
          count: 3

  - it: honors the availability objective override
    set:
      name: auth
      slo.enabled: true
      slo.availability.objective: 99.9
    asserts:
      - equal:
          path: spec.slos[0].objective
          value: 99.9

  - it: queries the semconv OTLP metric names with no job selector
    set:
      name: auth
      slo.enabled: true
    asserts:
      - matchRegex:
          path: spec.slos[0].sli.events.errorQuery
          pattern: http_server_request_duration_seconds_count
      - matchRegex:
          path: spec.slos[0].sli.events.errorQuery
          pattern: http_response_status_code=~"5\.\."
      - notMatchRegex:
          path: spec.slos[0].sli.events.errorQuery
          pattern: job=~
      - equal:
          path: spec.slos[0].alerting.name
          value: AuthHighErrorRate
      - equal:
          path: spec.slos[0].alerting.pageAlert.labels.channel
          value: "#alerts"
