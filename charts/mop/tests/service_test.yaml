suite: service
templates:
  - service.yaml
tests:
  - it: renders a single HTTP ClusterIP Service by default
    set:
      name: auth
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: auth
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 8080
      - equal:
          path: spec.selector.app
          value: auth

  - it: renders no Service when service.enabled is false (worker release)
    set:
      name: order-worker
      service.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders HTTP + headless gRPC Service when grpc.enabled
    set:
      name: product
      grpc.enabled: true
      grpc.port: 9090
    asserts:
      - hasDocuments:
          count: 2

  - it: the gRPC Service is headless and named <name>-grpc
    documentIndex: 1
    set:
      name: product
      grpc.enabled: true
      grpc.port: 9090
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: product-grpc
      - equal:
          path: spec.clusterIP
          value: None
      - equal:
          path: spec.ports[0].port
          value: 9090
      - equal:
          path: spec.ports[0].name
          value: grpc

  - it: renders only the gRPC Service when service.enabled=false but grpc.enabled
    set:
      name: product
      service.enabled: false
      grpc.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: product-grpc
