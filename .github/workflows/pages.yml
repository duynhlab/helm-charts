name: Publish Helm repo to Pages
run-name: 📄 Publish Helm repo to GitHub Pages

# Publishes a classic HTTP Helm repository to GitHub Pages using the
# "GitHub Actions" publishing source (no gh-pages branch).
#   helm repo add duynhlab https://duynhlab.github.io/helm-charts

on:
  push:
    branches: [main]
    paths:
      - 'charts/**'
  workflow_dispatch:

permissions:
  contents: read

# Never cancel an in-flight Pages deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v5
        with:
          fetch-depth: 0

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        with:
          enablement: true # set the Pages publishing source to "GitHub Actions"

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.9.0

      - name: Package charts and build repo index
        env:
          PAGES_URL: https://duynhlab.github.io/helm-charts
        run: |
          set -euo pipefail
          SITE=_site
          mkdir -p "$SITE"
          for d in charts/*/; do
            helm package "$d" -d "$SITE"
          done
          # The Actions model republishes the whole site each run, so merge with
          # the live index and carry forward previously published .tgz packages
          # to keep older chart versions resolvable.
          if curl -fsSL "$PAGES_URL/index.yaml" -o old-index.yaml; then
            grep -Eo "$PAGES_URL/[^[:space:]]+\.tgz" old-index.yaml | sort -u | while read -r u; do
              f="$SITE/$(basename "$u")"
              [ -f "$f" ] || curl -fsSL "$u" -o "$f" || true
            done
            helm repo index "$SITE" --url "$PAGES_URL" --merge old-index.yaml
          else
            helm repo index "$SITE" --url "$PAGES_URL"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
